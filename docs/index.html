<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FLOW — Connect, Fill, Solve</title>
<style>
  :root{--bg:#FBF7F0;--card:#fff;--ink:#2E2A3A;--soft:#6C6680;--mint:#5CC9A7;--grape:#9B7BE8}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(#BCE6F7,#E3F4DC);color:var(--ink)}
  .wrap{max-width:680px;margin:0 auto;padding:40px 22px}
  .hero{text-align:center;padding:30px 0}
  .dots{display:inline-grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
  .dot{width:46px;height:46px;border-radius:50%}
  h1{font-size:46px;letter-spacing:-2px;margin:6px 0}
  .sub{color:var(--soft);letter-spacing:2px;font-weight:700;font-size:12px}
  .card{background:var(--card);border-radius:22px;padding:22px 24px;margin:16px 0;box-shadow:0 6px 18px rgba(46,42,58,.08)}
  a.btn{display:inline-block;background:var(--mint);color:#fff;text-decoration:none;font-weight:800;padding:12px 22px;border-radius:14px;margin:6px}
  a.btn.alt{background:var(--grape)}
  a{color:var(--grape)}
  footer{text-align:center;color:var(--soft);font-size:13px;padding:24px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="dots">
      <div class="dot" style="background:#FF7B6B"></div>
      <div class="dot" style="background:#5BA9F0"></div>
      <div class="dot" style="background:#5CC9A7"></div>
      <div class="dot" style="background:#FFC24B"></div>
    </div>
    <h1>FLOW</h1>
    <div class="sub">CONNECT · FILL · SOLVE</div>
  </div>

  <div class="card">
    <p>A calm, offline pipe-connect puzzle. Link every pair, fill the whole grid,
    and solve 50+ hand-checked levels — no account, no sign-up, plays without internet.</p>
    <p style="text-align:center">
      <a class="btn" href="privacy.html">Privacy Policy</a>
      <a class="btn alt" href="terms.html">Terms of Service</a>
    </p>
  </div>

  <footer>
    Support: <a href="mailto:yatrawithmaps@gmail.com">yatrawithmaps@gmail.com</a><br>
    © 2026 FLOW. All rights reserved.
  </footer>
</div>
</body>
</html>
